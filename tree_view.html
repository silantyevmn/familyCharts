<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>my-family-chart - редактирование</title>
  <script src="https://unpkg.com/d3@7"></script>
  <link rel="stylesheet" href="https://unpkg.com/family-chart@0.9.0/dist/styles/family-chart.css">
  <style>
    body { margin: 0; background: #1e1e2f; color: white; font-family: Arial, sans-serif; }
    #FamilyChart { width: 100%; height: 100vh; background-color: rgb(33,33,33); }
    .message { text-align: center; padding: 50px; font-size: 1.2rem; }
    .error { color: #ff8888; }
    .loading { color: #88ff88; }
  </style>
</head>
<body>
<div id="FamilyChart" class="f3" style="width:100%;height:100vh;margin:auto;background-color:rgb(33,33,33);color:#fff;">
  <div class="message loading">Загрузка библиотек...</div>
</div>

<script>
  function showMessage(text, isError = false) {
    const container = document.getElementById('FamilyChart');
    if (container) {
      container.innerHTML = `<div class="message ${isError ? 'error' : 'loading'}">${text}</div>`;
    }
  }

  // Динамически загружаем family-chart как модуль
  const script = document.createElement('script');
  script.type = 'module';
  script.src = 'https://unpkg.com/family-chart@0.9.0';
  script.onload = () => {
    console.log('family-chart загружен, f3 доступна?', typeof f3);
    if (typeof f3 !== 'undefined') {
      showMessage('Библиотека загружена. Инициализация...');
      startApp();
    } else {
      showMessage('Ошибка: библиотека не создала переменную f3', true);
    }
  };
  script.onerror = () => {
    showMessage('Ошибка загрузки family-chart. Проверьте интернет.', true);
  };
  document.head.appendChild(script);

  function startApp() {
    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js").then(({ initializeApp }) => {
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js").then(({ getAuth, onAuthStateChanged }) => {
        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ getFirestore, doc, getDoc, setDoc, onSnapshot }) => {
          const firebaseConfig = {
            apiKey: "AIzaSyC8dabh_6jXYI22cpMfIA5mViNxaZAvzic",
            authDomain: "family-tree-auth-a3956.firebaseapp.com",
            projectId: "family-tree-auth-a3956",
            storageBucket: "family-tree-auth-a3956.firebasestorage.app",
            messagingSenderId: "718551498044",
            appId: "1:718551498044:web:6c7df78296f9156bd47239"
          };
          const app = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          const db = getFirestore(app);
          const treeDocRef = doc(db, "familyTree", "mainTree");

          async function saveToFirestore(treeData) {
            if (!treeData) return;
            try {
              await setDoc(treeDocRef, { treeData: treeData }, { merge: true });
              console.log("Сохранено");
            } catch(e) { console.error(e); }
          }

          async function loadFromFirestore() {
            try {
              const docSnap = await getDoc(treeDocRef);
              if (docSnap.exists() && docSnap.data().treeData) {
                return docSnap.data().treeData;
              } else {
                return [{
                  "id": "0", "rels": {}, "data": { "first name": "Name", "last name": "Surname", "birthday": 1970, "avatar": "", "gender": "M" }
                }];
              }
            } catch(e) { showMessage("Ошибка загрузки: "+e.message, true); return null; }
          }

          async function renderTree(data) {
            if (!data || !data.length) { showMessage("Нет данных", true); return; }
            const container = document.getElementById('FamilyChart');
            container.innerHTML = '';
            try {
              const chart = f3.createChart('#FamilyChart', data)
                .setTransitionTime(1000)
                .setCardXSpacing(250)
                .setCardYSpacing(150)
                .setSingleParentEmptyCard(true, {label:'ADD'})
                .setShowSiblingsOfMain(false)
                .setOrientationVertical();
              const card = chart.setCardHtml()
                .setCardDisplay([["first name","last name"],["birth year","death year"]])
                .setCardDim(null)
                .setMiniTree(true)
                .setStyle('imageRect')
                .setOnHoverPathToMain();
              // const editTree = chart.editTree()
              //   .fixed(true)
              //   .setFields(["first name","last name","birthday","avatar","birth year","death year","location"])
              //   .setEditFirst(true)
              //   .setCardClickOpen(card);
              // editTree.setEdit();
              // editTree.setOnChange(async () => {
              //   const updated = editTree.exportData();
              //   await saveToFirestore(updated);
              // });
              chart.updateTree({initial:true});
              let main = chart.getMainDatum();
              if (!main && data.length) main = data[0];
              //if (main) editTree.open(main);
              chart.updateTree({initial:true});

              // Сохраняем ссылку на chart для последующего переключения персоны
              window.f3Chart = chart;
              window.treeRendered = true;
            } catch(e) { showMessage("Ошибка отрисовки: "+e.message, true); }
          }

          onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            showMessage("Загрузка данных...");
            const treeData = await loadFromFirestore();
            if (treeData) {
              await renderTree(treeData);
              
              // ---- НОВАЯ ЛОГИКА: привязка пользователя к персоне ----
              const uid = user.uid;
              const userDocRef = doc(db, "users", uid);
              const userDocSnap = await getDoc(userDocRef);
              let personId = null;
              if (userDocSnap.exists() && userDocSnap.data().personId) {
                personId = userDocSnap.data().personId;
                console.log(`Связь: пользователь ${user.email} -> персона ${personId}`);
              } else {
                console.warn(`Для пользователя ${user.email} не найдена связь, используем персону по умолчанию (первая в дереве)`);
              }
              
              // Переключаем фокус дерева, если задан personId и chart уже создан
              if (personId && window.f3Chart) {
                try {
                  window.f3Chart.updateMainId(personId);
                  window.f3Chart.updateTree();
                  console.log(`Древо переключено на персону ${personId}`);
                } catch(e) {
                  console.error("Ошибка переключения персоны:", e);
                }
              }
              // ------------------------------------------------
            }
          });
        }).catch(e => showMessage("Ошибка firestore: "+e.message, true));
      }).catch(e => showMessage("Ошибка auth: "+e.message, true));
    }).catch(e => showMessage("Ошибка Firebase: "+e.message, true));
  }
</script>
</body>
</html>
