<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в семейное древо</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: #1e1e2f;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .login-card input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .login-card button {
            width: 100%;
            padding: 10px;
            background: #2c7da0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .error {
            color: #d9534f;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🌳 Семейное древо</h2>
    <p>Введите email и пароль</p>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
    <button id="loginBtn">Войти</button>
    <div id="errorMsg" class="error"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword } from "firebase/auth";

    // ВСТАВЬТЕ ВАШ КОНФИГ FIREBASE
    const firebaseConfig = {
		apiKey: "AIzaSyC8dabh_6jXYI22cpMfIA5mViNxaZAvzic",
		authDomain: "family-tree-auth-a3956.firebaseapp.com",
		projectId: "family-tree-auth-a3956",
		storageBucket: "family-tree-auth-a3956.firebasestorage.app",
		messagingSenderId: "718551498044",
		appId: "1:718551498044:web:6c7df78296f9156bd47239"
	};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                // Успешный вход — перенаправляем на страницу с деревом
                window.location.href = "tree_edit.html";
            })
            .catch((error) => {
                errorDiv.textContent = "Ошибка: неверный email или пароль";
                console.error(error);
            });
    });
</script>
</body>
</html>
