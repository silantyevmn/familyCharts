<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>my-family-chart (diagnostic)</title>
  <script src="https://unpkg.com/d3@7"></script>
  <script type="module" src="https://unpkg.com/family-chart@0.9.0"></script>
  <link rel="stylesheet" href="https://unpkg.com/family-chart@0.9.0/dist/styles/family-chart.css">
  <style>
    body { margin: 0; background: #1e1e2f; color: white; font-family: monospace; }
    #log {
      background: #0f0f1a;
      padding: 10px;
      font-size: 14px;
      white-space: pre-wrap;
      max-height: 100vh;
      overflow-y: auto;
    }
    .log-entry { margin: 4px 0; border-bottom: 1px solid #333; padding: 4px; }
    .error { color: #ff8888; background: #330000; }
    .success { color: #88ff88; }
    .info { color: #88aaff; }
  </style>
</head>
<body>
<div id="log">Лог будет здесь...</div>
<div id="FamilyChart" style="display:none;"></div>

<script>
  // Ранняя диагностика: добавляем сообщения в лог
  const logDiv = document.getElementById('log');
  function addLog(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
    logDiv.appendChild(entry);
    console.log(msg);
  }
  window.onerror = (msg, url, line, col, error) => {
    addLog(`Глобальная ошибка: ${msg} (${url}:${line}:${col})`, 'error');
    if (error && error.stack) addLog(error.stack, 'error');
    return false;
  };
  window.onunhandledrejection = (event) => {
    addLog(`Unhandled rejection: ${event.reason}`, 'error');
  };
  addLog('Страница загружена, начало диагностики', 'info');
</script>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "firebase/firestore";

  // Функция для добавления сообщений в лог из модуля
  function addLog(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
    document.getElementById('log').appendChild(entry);
    console.log(msg);
  }

  addLog('Модуль загружен, начинаем инициализацию Firebase', 'info');

  const firebaseConfig = {
    apiKey: "AIzaSyC8dabh_6jXYI22cpMfIA5mViNxaZAvzic",
    authDomain: "family-tree-auth-a3956.firebaseapp.com",
    projectId: "family-tree-auth-a3956",
    storageBucket: "family-tree-auth-a3956.firebasestorage.app",
    messagingSenderId: "718551498044",
    appId: "1:718551498044:web:6c7df78296f9156bd47239"
  };

  let app, auth, db, treeDocRef;
  try {
    app = initializeApp(firebaseConfig);
    addLog('Firebase инициализирован', 'success');
    auth = getAuth(app);
    addLog('Auth получен', 'success');
    db = getFirestore(app);
    addLog('Firestore получен', 'success');
    treeDocRef = doc(db, "familyTree", "mainTree");
    addLog('Документ mainTree создан', 'success');
  } catch (err) {
    addLog(`Ошибка инициализации Firebase: ${err.message}`, 'error');
    throw err;
  }

  // Функция отображения дерева (упрощённая, без автосохранения для диагностики)
  async function renderTree(initialData) {
    addLog(`renderTree вызван, данных: ${initialData ? initialData.length : 0}`, 'info');
    if (!initialData || !initialData.length) {
      addLog('Нет данных для отрисовки', 'error');
      return;
    }
    try {
      const container = document.getElementById('FamilyChart');
      container.style.display = 'block';
      container.innerHTML = '';
      addLog('Создаём дерево...', 'info');
      const f3Chart = f3.createChart('#FamilyChart', initialData)
        .setTransitionTime(1000)
        .setCardXSpacing(250)
        .setCardYSpacing(150)
        .setSingleParentEmptyCard(true, { label: 'ADD' })
        .setShowSiblingsOfMain(false)
        .setOrientationVertical();

      const f3Card = f3Chart.setCardHtml()
        .setCardDisplay([["first name","last name"],["birth year","death year"]])
        .setCardDim(null)
        .setMiniTree(true)
        .setStyle('imageRect')
        .setOnHoverPathToMain();

      const f3EditTree = f3Chart.editTree()
        .fixed(true)
        .setFields(["first name","last name","birthday","avatar","birth year","death year","location"])
        .setEditFirst(true)
        .setCardClickOpen(f3Card);
      f3EditTree.setEdit();

      f3Chart.updateTree({ initial: true });
      let mainDatum = f3Chart.getMainDatum();
      if (!mainDatum && initialData.length > 0) mainDatum = initialData[0];
      if (mainDatum) f3EditTree.open(mainDatum);
      f3Chart.updateTree({ initial: true });
      addLog('Дерево успешно отрисовано', 'success');
      // скрываем лог, показываем дерево на весь экран
      document.getElementById('log').style.display = 'none';
    } catch (err) {
      addLog(`Ошибка отрисовки: ${err.message}`, 'error');
    }
  }

  async function loadFromFirestore() {
    addLog('Загрузка данных из Firestore...', 'info');
    try {
      const docSnap = await getDoc(treeDocRef);
      if (docSnap.exists() && docSnap.data().treeData) {
        addLog(`Данные получены, узлов: ${docSnap.data().treeData.length}`, 'success');
        return docSnap.data().treeData;
      } else {
        addLog('Документ не найден, возвращаем fallback', 'info');
        return [{
          "id": "0",
          "rels": {},
          "data": { "first name": "Test", "last name": "Test", "birthday": 1970, "avatar": "", "gender": "M" }
        }];
      }
    } catch (err) {
      addLog(`Ошибка загрузки из Firestore: ${err.message}`, 'error');
      throw err;
    }
  }

  // Таймаут для авторизации
  let authTimeout = setTimeout(() => {
    addLog('ПРЕДУПРЕЖДЕНИЕ: onAuthStateChanged не сработал за 15 секунд. Возможно, проблема с Firebase Auth.', 'error');
  }, 15000);

  addLog('Ожидаем onAuthStateChanged...', 'info');
  onAuthStateChanged(auth, async (user) => {
    clearTimeout(authTimeout);
    addLog(`onAuthStateChanged сработал, user: ${user ? user.email : 'null'}`, user ? 'success' : 'error');
    if (!user) {
      addLog('Перенаправление на index.html', 'info');
      window.location.href = "index.html";
      return;
    }
    addLog(`Пользователь авторизован: ${user.email}`, 'success');
    const treeData = await loadFromFirestore();
    await renderTree(treeData);
  });

  // Дополнительная проверка: если через 2 секунды onAuthStateChanged не сработал, покажем это в логе
  setTimeout(() => {
    addLog('Проверка: прошло 2 секунды, onAuthStateChanged всё ещё может не сработать', 'info');
  }, 2000);
</script>
</body>
</html>
